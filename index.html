<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Acuario de Esperanza ✨</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --aqua-main: #98e2e6;
            --aqua-dark: #7bcbd0;
            --duck-yellow: #ffe162;
            --pink-stickers: #ffc2d1;
            --white-sticker: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--aqua-main);
            overflow: hidden;
        }

         #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.9);
            background-image: url('arrecife.jpg'); 
            background-color: var(--aqua-main);
        }



        .signature {
            position: absolute;
            top: 25px;
            right: 35px;
            font-size: 26px;
            color: white;
            text-shadow: 3px 3px 0px var(--aqua-dark);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        /* LOGO TIPO DUCKDUCKGO (Cartoon Sticker) */
        .duck-logo {
            width: 140px;
            height: 140px;
            background: var(--duck-yellow);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            border: 8px solid var(--white-sticker);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .duck-logo:hover { transform: scale(1.1) rotate(-5deg); }
        .duck-logo::after {
            content: 'CUAC!';
            position: absolute;
            bottom: -10px;
            right: -20px;
            background: var(--pink-stickers);
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 10px;
            font-weight: 700;
            color: white;
            border: 3px solid white;
        }

        /* BUSCADOR ESTILO PEGATINA */
        .search-wrapper {
            background: var(--white-sticker);
            padding: 10px 30px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 0px var(--aqua-dark);
            width: 85%;
            max-width: 550px;
            border: 4px solid var(--white-sticker);
        }

        input[type="text"] {
            border: none;
            outline: none;
            width: 100%;
            padding: 12px;
            font-size: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: #555;
        }

        /* BOTONES CON ICONOS DE ANIMALES */
        .controls {
            display: flex;
            gap: 20px;
        }

        .btn-sticker {
            background-color: var(--pink-stickers);
            color: white;
            border: 4px solid white;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }

        .btn-sticker:hover {
            transform: translateY(3px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
            filter: brightness(1.05);
        }

        .btn-aqua { background-color: var(--aqua-dark); }

        #file-input { display: none; }

        /* Animación suave de entrada */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>
    <div class="signature">Esperanza’s World ✨</div>

    <div class="main-container fade-in">
        <!-- Logo Sticker Duck -->
        <div class="duck-logo">🐤</div>

        <!-- Buscador -->
        <form class="search-wrapper" action="https://google.com" method="get">
            <input type="text" name="q" placeholder="Escribe aquí para buscar..." autocomplete="off">
        </form>

        <!-- Botones Pegatina -->
        <div class="controls">
            <label for="file-input" class="btn-sticker">
                <span>🐰</span> Cambiar Fondo
            </label>
            <input type="file" id="file-input" accept="image/*">
            
            <button class="btn-sticker btn-aqua" onclick="clearBackground()">
                <span>🐱</span> Reset
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const bgContainer = document.getElementById('bg-container');

        window.onload = () => {
            const savedBg = localStorage.getItem('userBackground');
        if (savedBg) {
        // Si hay una foto subida por ella, la ponemos encima de la de por defecto
        bgContainer.style.backgroundImage = `url(${savedBg})`;
            }
        };


        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64 = reader.result;
                bgContainer.style.backgroundImage = `url(${base64})`;
                localStorage.setItem('userBackground', base64);
            };
            if (file) reader.readAsDataURL(file);
        });

        function clearBackground() {
            localStorage.removeItem('userBackground');
            // Volvemos a poner la URL original
            bgContainer.style.backgroundImage = "url('https://freepik.com')";
        }
    </script>
</body>
</html>
