<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Acuario de Esperanza ✨</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://w3.org' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐤</text></svg>">
    <style>
        :root {
            --aqua-main: #98e2e6;
            --aqua-dark: #7bcbd0;
            --duck-yellow: #ffe162;
            --pink-stickers: #ffc2d1;
            --white-sticker: #ffffff;
            --text-color: #495057;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Quicksand', sans-serif;
            background-color: var(--aqua-main);
            overflow: hidden;
        }

        #bg-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.9);
            /* AQUÍ PONES EL NOMBRE DEL ARCHIVO */
            background-image: url('arrecife.png'); 
        }

        /* Estilos para el Reloj y Fecha */
        #clock-container {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            z-index: 100;
            pointer-events: none;
        }
        #time {
            font-size: 50px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            padding: 5px 30px;
            border-radius: 25px;
            border: 3px solid white;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #date {
            font-size: 20px;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 15px;
            border-radius: 12px;
            display: inline-block;
        }

        #bubbles-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .bubble { position: absolute; bottom: -50px; background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 50%; animation: floatUp var(--duration) linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.7; } 100% { transform: translateY(-110vh) translateX(var(--wobble)); opacity: 0; } }

        #hamster-btn { position: absolute; top: 20px; left: 30px; font-size: 45px; cursor: pointer; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); filter: drop-shadow(3px 3px 0px white); z-index: 100; }
        #hamster-btn:hover { transform: scale(1.2) rotate(-10deg); }

        .signature { position: absolute; top: 25px; right: 35px; font-size: 26px; color: white; text-shadow: 3px 3px 0px var(--aqua-dark); font-weight: 700; z-index: 10; }
                
        /* Busca esta clase y cambia solo el valor de margin-top */
        .main-container { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 25px; 
            position: relative; 
            z-index: 10; 
            /* Cambia el -130px por este valor positivo para que baje */
            margin-top: 50px; 
        }


                #custom-alert {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e1e; /* Color oscuro como el de tu imagen */
            color: white;
            padding: 20px;
            border-radius: 20px;
            width: 300px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: left;
        }

        .alert-header {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }

        #alert-text {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        #custom-alert button {
            background: #a2d2ff;
            color: #1e1e1e;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            float: right;
            cursor: pointer;
            font-weight: bold;
        }

        #ai-chat-container {
            display: none;
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 500px;
            background: white;
            border-radius: 20px;
            border: 4px solid var(--aqua-dark);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            z-index: 3000;
            overflow: hidden;
            flex-direction: column;
        }

        #ai-chat-container iframe {
            width: 100%;
            height: calc(100% - 50px);
        }

        .chat-header-bar {
            background: var(--aqua-dark);
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: bold;
        }

        .chat-header-bar button {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        #open-ai-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--aqua-dark);
            color: white;
            border: 4px solid white;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 5px 0px #5ea3a5;
            z-index: 3000;
        }


        .duck-logo { width: 140px; height: 140px; background: var(--duck-yellow); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 80px; border: 8px solid var(--white-sticker); box-shadow: 0 8px 15px rgba(0,0,0,0.1); position: relative; cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .duck-logo:hover { transform: scale(1.1) rotate(-5deg); }
        .duck-logo::after { content: 'CUAC!'; position: absolute; bottom: -10px; right: -20px; background: var(--pink-stickers); font-size: 14px; padding: 5px 10px; border-radius: 10px; font-weight: 700; color: white; border: 3px solid white; }

        .search-wrapper { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 10px 30px; border-radius: 40px; display: flex; align-items: center; box-shadow: 0 10px 0px var(--aqua-dark); width: 85%; max-width: 550px; border: 4px solid var(--white-sticker); }
        input[type="text"] { border: none; outline: none; background: none; width: 100%; padding: 12px; font-size: 20px; font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--text-color); }

        .controls { display: flex; gap: 15px; }
        .btn-sticker { background-color: var(--pink-stickers); color: white; border: 4px solid white; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 6px 0px rgba(0,0,0,0.1); transition: all 0.2s ease; }
        .btn-sticker:hover { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.1); }
        .btn-aqua { background-color: var(--aqua-dark); }
        #file-input { display: none; }

        @keyframes highlightText { 0% { transform: scale(1); } 50% { transform: scale(1.02); color: #ff69b4; } 100% { transform: scale(1); } }
        .highlight-msg { animation: highlightText 0.5s ease-in-out; }
    </style>
</head>
<body>

    <!-- Ventana de Chat Directo -->
<div id="ai-chat-container">
    <div class="chat-header-bar">
        <span>🤖 Asistente de Esperanza</span>
        <button onclick="toggleAiChat()">✖</button>
    </div>
    <!-- Aquí cargamos una versión ligera de chat -->
<iframe src="https://duckduckgo.com" frameborder="0"></iframe>

</div>

<!-- Botón para abrir el chat -->
<div id="open-ai-btn" onclick="toggleAiChat()">🤖 AI</div>

        <div id="custom-alert">
        <div class="alert-content">
            <div class="alert-header">By Gonzalo</div>
            <p id="alert-text"></p>
            <button onclick="closeAlert()">Aceptar</button>
        </div>
    </div>

        <!-- Reloj Centrado Superior -->
    <div id="clock-container">
        <div id="time">00:00:00</div><br>
        <div id="date">Cargando fecha...</div>
    </div>
    <div id="bg-container"></div>
    <div id="bubbles-container"></div>
    <div id="hamster-btn">🐹</div>
    <div class="signature">Esperanza’s World ✨</div>

    <div class="main-container">
        <div class="duck-logo">🐤</div>
       <!-- La URL del action debe ser EXACTAMENTE esta -->
<form class="search-wrapper" action="https://www.google.com/search" method="get" target="_blank">
    <!-- El name="q" es OBLIGATORIO para que Google reciba la búsqueda -->
    <input type="text" id="search-input" name="q" placeholder="¿Qué buscamos hoy, Esperanza?" autocomplete="off">
</form>


        <div class="controls">
            <label for="file-input" class="btn-sticker"><span>🐰</span> Fondo</label>
            <input type="file" id="file-input" accept="image/*">
            <button class="btn-sticker btn-aqua" onclick="triggerExtraBubbles()"><span>🫧</span> Burbujas</button>
            <button class="btn-sticker btn-aqua" onclick="clearBackground()"><span>🐱</span> Reset</button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const bgContainer = document.getElementById('bg-container');
        const searchInput = document.getElementById('search-input');

        const sndDuck = new Audio('https://myinstants.com');
        const sndBubbles = new Audio('https://myinstants.com');
        const sndHamster = new Audio('https://myinstants.com');

        window.onload = () => {
            const savedBg = localStorage.getItem('userBackground');
            if (savedBg) bgContainer.style.backgroundImage = `url(${savedBg})`;
            createBubbles(15);
        };

        // ACCIÓN HÁMSTER
       document.getElementById('hamster-btn').onclick = () => {
    if(typeof sndHamster !== 'undefined') sndHamster.play().catch(()=>{});
    
    document.getElementById('alert-text').innerText = "¡De tu hamster favorito desde Cordoba, para la pitufa más increible de Asturias! 🐹✨";
    document.getElementById('custom-alert').style.display = "block";
};

function closeAlert() {
    document.getElementById('custom-alert').style.display = "none";
}

    function toggleAiChat() {
    // En lugar de abrir un iframe que falla, abrimos una ventana flotante pequeña y estética
    const url = 'https://duck.ai/?origin=funnel_home_website';
    const name = 'Asistente de Esperanza';
    const specs = 'width=400,height=600,top=100,left=100,menubar=no,toolbar=no,location=no,status=no';
    
    window.open(url, name, specs);
}



            // Lógica del Reloj y Fecha
    function updateClock() {
        const now = new Date();
        // Hora formateada
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('time').innerText = `${h}:${m}:${s}`;
        
        // Fecha formateada (ej: Lunes, 22 de abril)
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        let dateStr = now.toLocaleDateString('es-ES', options);
        // Primera letra en mayúscula
        document.getElementById('date').innerText = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
    }

    // Iniciar actualización cada segundo
    setInterval(updateClock, 1000);
    updateClock(); // Llamada inmediata al cargar


        // ACCIÓN PATITO
        document.querySelector('.duck-logo').onclick = () => {
            sndDuck.play();
            const original = searchInput.placeholder;
            searchInput.placeholder = "¡Ten un gran día, Esperansita!, ¡Eres la mejor!";
            searchInput.classList.add('highlight-msg');
            setTimeout(() => {
                searchInput.placeholder = original;
                searchInput.classList.remove('highlight-msg');
            }, 4000);
        };

        // LÓGICA DE BURBUJAS
        function createBubbles(count) {
            const container = document.getElementById('bubbles-container');
            for (let i = 0; i < count; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = Math.random() * 30 + 10 + "px";
                b.style.width = b.style.height = size;
                b.style.left = Math.random() * 100 + "%";
                b.style.setProperty('--duration', Math.random() * 5 + 5 + "s");
                b.style.setProperty('--wobble', (Math.random() * 100 - 50) + "px");
                b.style.animationDelay = Math.random() * 5 + "s";
                container.appendChild(b);
            }
        }

        function triggerExtraBubbles() {
            sndBubbles.play();
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const b = document.createElement('div');
                    b.className = 'bubble';
                    const size = Math.random() * 25 + 10 + "px";
                    b.style.width = b.style.height = size;
                    b.style.left = Math.random() * 100 + "%";
                    b.style.setProperty('--duration', "3s");
                    b.style.setProperty('--wobble', (Math.random() * 100 - 50) + "px");
                    document.getElementById('bubbles-container').appendChild(b);
                    setTimeout(() => b.remove(), 3500);
                }, i * 50);
            }
        }

        // LÓGICA DE FONDO (MEJORADA)
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const imgData = event.target.result;
                bgContainer.style.backgroundImage = `url(${imgData})`;
                try {
                    localStorage.setItem('userBackground', imgData);
                } catch (e) {
                    console.log("Imagen muy pesada para guardar, pero se muestra igual.");
                }
            };
            reader.readAsDataURL(file);
        });

        function clearBackground() {
            localStorage.removeItem('userBackground');
            bgContainer.style.backgroundImage = "url('https://freepik.com')";
        }
    </script>
</body>
</html>
